name: Récupération degrés-jours Neuchâtel

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Télécharger DJ.xlsx
        run: |
          mkdir -p data
          curl -L "https://www5.ne.ch/SENE-air/DJ.xlsx" \
               -o data/DJ.xlsx \
               --fail --retry 3

      - name: Commit si changement
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/DJ.xlsx
          git diff --cached --quiet || \
            git commit -m "data: DJ.xlsx $(date +'%Y-%m-%d')"
          git push
